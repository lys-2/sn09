<form action="/login" method="post">

<form action="/user" method="post">
  <input type="submit" value="reg">

<form action="/char" method="post">

  <input type="submit" value="create">
  <label for="race"> race:</label>
  <select id="race" name="race">
    <option value="human">human</option>
    <option value="dwarf">dwarf</option>
    <option value="cat-like">cat-like</option>
  </select>

  <label for="class"> class:</label>
  <select id="class" name="class">
    <option value="fighter">fighter</option>
    <option value="mage">mage</option>
    <option value="rogue">rogue</option>
  </select>

<label for="gen">gen:</label>
  <select id="gen" name="gen">
    <option value="m">m</option>
    <option value="f">f</option>
  </select>

  <label for="age">age (14-60)</label>
  <input type="range" id="age" name="age" min="14" max="60" value="19">
  <label for="weight">weight (50-130)</label>
  <input type="range" id="weight" name="weight" min="50" max="130" value="70">
    <label for="height">height (133-195)</label>

<form action="/move">
